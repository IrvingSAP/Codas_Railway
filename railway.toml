# CODAS — despliegue en Railway (config as code).
# Doc: docs/CODAS_DEPLOYMENT_RAILWAY_CHECKLIST.md
# Requiere variables de producción en el servicio Web (incl. DATABASE_URL, CSRF_TRUSTED_ORIGINS).
# Tailwind: static/css/tailwind.css va versionado en Git; compilar en local (npm run build:css:min) antes del push.

[build]
buildCommand = "pip install -r requirements.txt && DJANGO_SETTINGS_MODULE=codas.settings.collectstatic_build python manage.py collectstatic --noinput"

[deploy]
# migrate en start (no preDeploy): ${{RAILWAY_PUBLIC_DOMAIN}} no se expande en pre-deploy.
startCommand = "DJANGO_SETTINGS_MODULE=codas.settings.production python manage.py migrate --noinput && gunicorn codas.wsgi:application --bind 0.0.0.0:$PORT"
restartPolicyType = "ON_FAILURE"
