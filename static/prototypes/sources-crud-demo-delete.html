<!DOCTYPE html>
<html lang="es">
<head>

  <script>

      theme: {

          colors: {
            codas: { dark: '#0a1a2f', accent: '#1e90ff', hover: '#1877d3' }

        }
      }
    }

</head>
<body class="flex h-screen min-h-0 flex-col overflow-hidden bg-slate-950 text-slate-200 antialiased">
  <div class="shrink-0 border-b border-white/10 bg-slate-900 py-2 text-center text-xs text-slate-400">

    <span class="mx-2 text-slate-600">|</span>
    <a href="sources-crud-demo-detail.html" class="hover:text-codas-accent underline">Detalle</a>
    <span class="mx-2 text-slate-600">|</span>
    <a href="sources-crud-demo-form.html" class="hover:text-codas-accent underline">Alta / edición</a>

          <button type="button" class="rounded-md bg-rose-600 px-5 py-2.5 text-sm font-medium text-white hover:bg-rose-500">Sí, eliminar</button>
          <a href="sources-crud-demo-detail.html" class="inline-flex items-center rounded-md border border-slate-600 px-5 py-2.5 text-sm text-slate-300 no-underline hover:border-slate-500 hover:bg-white/5">Cancelar</a>
